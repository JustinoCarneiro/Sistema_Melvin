version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    # Mantendo o nome original para que o docker-compose substitua o container anterior corretamente
    container_name: sistema_melvin-frontend-1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:5173"
    environment:
      - VITE_API_URL=http://backend-melvin:8080
    depends_on:
      - backend

# Removido redes específicas para usar a rede padrão do docker-compose.yml base
