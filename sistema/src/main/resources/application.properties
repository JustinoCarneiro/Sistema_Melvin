spring.application.name=sistema

# --- BANCO DE DADOS ---
# O Spring Boot pega automaticamente das variáveis de ambiente que definimos no Docker:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, etc.
# Mas deixamos aqui como fallback caso rode fora do Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgresdb:5432/melvin_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:melvin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:melvin}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# --- SEGURANÇA (JWT) ---
# Lê a variável de ambiente JWT_SECRET injetada pelo Docker
# Se não for fornecido, o sistema deve falhar ao iniciar por segurança em prod
api.security.token.secret=${JWT_SECRET}

# --- INTEGRAÇÃO FRONTEND ---
# Lê a variável de ambiente FRONTEND_URL
frontend.url=${FRONTEND_URL:http://localhost:5173}

# --- UPLOAD DE ARQUIVOS ---
# Caminhos absolutos dentro do container (mapeados nos volumes do docker-compose)
file.upload-dir-diarios=/app/docs/diarios/
file.upload-dir-imagensembaixadores=/app/docs/imagens_embaixadores/
file.upload-dir-imagensavisos=/app/docs/imagens_avisos/

# Configuração de tamanho de upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- E-MAIL (SMTP) ---
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true