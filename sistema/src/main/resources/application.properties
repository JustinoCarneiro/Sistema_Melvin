spring.application.name=sistema

# --- BANCO DE DADOS ---
# O Spring Boot pega automaticamente das variáveis de ambiente que definimos no Docker:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, etc.
# Mas deixamos aqui como fallback caso rode fora do Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgresdb:5432/melvin_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:melvin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:melvin}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- SEGURANÇA (JWT) ---
# Lê a variável de ambiente JWT_SECRET injetada pelo Docker
api.security.token.secret=${JWT_SECRET:segredo_padrao_desenvolvimento}

# --- INTEGRAÇÃO FRONTEND ---
# Lê a variável de ambiente FRONTEND_URL
frontend.url=${FRONTEND_URL:http://localhost:5173}

# --- UPLOAD DE ARQUIVOS ---
# Caminhos absolutos dentro do container (mapeados nos volumes do docker-compose)
file.upload-dir-diarios=/app/docs/diarios/
file.upload-dir-imagensembaixadores=/app/docs/imagens_embaixadores/
file.upload-dir-imagensavisos=/app/docs/imagens_avisos/

# Configuração de tamanho de upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB