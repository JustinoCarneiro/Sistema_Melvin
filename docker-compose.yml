version: '3.7'

services:
  postgresdb:
    image: postgresqldb-melvin
    build:
      context: ./postgres
    container_name: postgresdb
    # Adicionando leitura do arquivo .env
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G

  backend:
    image: backend-melvin
    build:
      context: ./sistema
    container_name: backend-melvin # Nome fixo ajuda no debug
    env_file:
      - .env
    environment:
      # Passando as variáveis do .env para o Java
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      
      # Variáveis personalizadas que o application.properties vai ler
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      
      # Hibernate
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./sistema:/app/src
      # Volumes para persistir arquivos
      - docs_diarios:/app/docs/diarios
      - docs_imagensembaixadores:/app/docs/imagens_embaixadores
      - docs_imagensavisos:/app/docs/imagens_avisos
    depends_on:
      - postgresdb
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    image: frontend-melvin
    build:
      context: ./frontend
      args: 
        - VITE_REACT_APP_FETCH_URL=${VITE_REACT_APP_FETCH_URL}
    env_file:
      - .env
    ports:
      - "80:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/PORTFOLIO
      - /PORTFOLIO/node_modules

volumes:
  postgres_data:
  docs_diarios:
  docs_imagensembaixadores:
  docs_imagensavisos: